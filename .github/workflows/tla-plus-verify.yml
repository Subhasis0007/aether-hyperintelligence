name: tla-plus-verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download TLA+ tools
        run: |
          mkdir -p tools/tla
          curl -L -o tools/tla/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLC model checker
        working-directory: formal-verification/model-checker
        run: |
          java -XX:+UseParallelGC -jar ../../tools/tla/tla2tools.jar \
            -config IncidentFSM.cfg \
            ../tla+/IncidentCommandFSM.tla
