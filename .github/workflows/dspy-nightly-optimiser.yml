
name: dspy-nightly-optimiser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: dspy-nightly-optimiser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  optimise:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dspy.txt

      - name: Validate workflow prerequisites
        run: |
          set -e
          test -f src/langgraph/dspy/nightly_optimiser.py
          test -n "$AZURE_OPENAI_ENDPOINT"
          test -n "$AZURE_OPENAI_API_KEY"
          test -n "$AZURE_OPENAI_DEPLOYMENT"
          test -n "$AZURE_OPENAI_API_VERSION"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_KEY"

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip

          if [ -f requirements-dspy.txt ]; then
            pip install -r requirements-dspy.txt
          fi

          pip install \
            litellm>=1.58.0 \
            "openai>=1.10.0,<2" \
            requests>=2.32.0

      - name: Test Azure OpenAI diagnostics
        run: python scripts/test_azure_openai.py

      - name: Run DSPy optimiser
        run: python -u src/langgraph/dspy/nightly_optimiser.py
