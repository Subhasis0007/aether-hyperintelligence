
name: DSPy Nightly Optimiser

on:
  workflow_dispatch: {}
  schedule:
    # Runs every day at 02:00 UTC
    - cron: "0 2 * * *"

# ✅ VALID permissions only
permissions:
  contents: write
  pull-requests: write

jobs:
  dspy-nightly:
    name: DSPy Auto Optimisation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # ✅ Explicit secret injection (critical)
    env:
      # Azure OpenAI
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      # Supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # GitHub automation (PAT)
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # AETHER internal
      AETHER_API_KEY: ${{ secrets.AETHER_API_KEY }}
      AETHER_TENANT_ID: ${{ secrets.AETHER_TENANT_ID }}

      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4

      - name: ✅ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: ✅ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Validate required environment variables
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_OPENAI_ENDPOINT
            AZURE_OPENAI_API_KEY
            AZURE_OPENAI_DEPLOYMENT
            AZURE_OPENAI_API_VERSION
            SUPABASE_URL
            SUPABASE_KEY
            GITHUB_TOKEN
            AETHER_API_KEY
            AETHER_TENANT_ID
          )

          for var in "${required_vars[@]}"; do
            if [[ -z "${!var:-}" ]]; then
              echo "❌ ERROR: Missing required environment variable: $var"
              exit 1
            fi
          done

          echo "✅ All required environment variables are present"

      - name: 🚀 Run DSPy Nightly Optimiser
        run: |
          python src/langgraph/dspy/nightly_optimiser.py
