
name: DSPy Nightly Optimiser

on:
  workflow_dispatch: {}
  schedule:
    # Runs every day at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  dspy-nightly:
    name: DSPy Auto Optimisation
    runs-on: ubuntu-latest

    # ✅ IMPORTANT: Secrets explicitly mapped to env
    env:
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      AETHER_API_KEY: ${{ secrets.AETHER_API_KEY }}
      AETHER_TENANT_ID: ${{ secrets.AETHER_TENANT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Safe visibility check (does not print secrets)
      - name: Validate required environment variables
        run: |
          echo "AZURE_OPENAI_ENDPOINT set? -> ${AZURE_OPENAI_ENDPOINT:+YES}"
          echo "AZURE_OPENAI_API_KEY set? -> ${AZURE_OPENAI_API_KEY:+YES}"
          echo "AZURE_OPENAI_DEPLOYMENT set? -> ${AZURE_OPENAI_DEPLOYMENT:+YES}"
          echo "AZURE_OPENAI_API_VERSION set? -> ${AZURE_OPENAI_API_VERSION:+YES}"
          echo "SUPABASE_URL set? -> ${SUPABASE_URL:+YES}"
          echo "SUPABASE_KEY set? -> ${SUPABASE_KEY:+YES}"
          echo "✅ Environment looks good"

      - name: Run DSPy Nightly Optimiser
        run: |
          python src/langgraph/dspy/nightly_optimiser.py
