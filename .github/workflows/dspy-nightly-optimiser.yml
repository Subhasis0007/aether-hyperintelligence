name: dspy-nightly-optimiser

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  optimise:
    runs-on: ubuntu-latest

    env:
      AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dspy.txt ]; then pip install -r requirements-dspy.txt; fi
          pip install dspy-ai litellm

      - name: Validate required secrets are present
        run: |
          python - << 'PY'
          import os, sys
          required = [
              "AZURE_OPENAI_ENDPOINT",
              "AZURE_OPENAI_API_KEY",
              "AZURE_OPENAI_DEPLOYMENT",
              "AZURE_OPENAI_API_VERSION",
              "SUPABASE_URL",
              "SUPABASE_KEY",
              "GITHUB_TOKEN",
          ]
          missing = [name for name in required if not os.environ.get(name, "").strip()]
          if missing:
              print("Missing required environment variables:", ", ".join(missing))
              sys.exit(1)
          print("All required secrets are present.")
          PY

      - name: Run DSPy nightly optimiser
        run: |
          python src/langgraph/dspy/nightly_optimiser.py