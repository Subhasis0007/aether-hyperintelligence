version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: aether-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: aether-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: aether-schema-registry
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aether-kafka-ui
    depends_on:
      - kafka
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: aether
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "8080:8080"

  temporal:
    image: temporalio/auto-setup:latest
    container_name: aether-temporal
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:latest
    container_name: aether-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "8233:8080"

  neo4j:
    image: neo4j:latest
    container_name: aether-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"

  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: aether-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
    ports:
      - "8090:8080"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aether-qdrant
    ports:
      - "6333:6333"

  redis:
    image: redis:latest
    container_name: aether-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    container_name: aether-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: aether-mosquitto
    ports:
      - "1883:1883"

  minio:
    image: minio/minio:latest
    container_name: aether-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  grafana:
    image: grafana/grafana:latest
    container_name: aether-grafana
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: aether-prometheus
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: aether-jaeger
    ports:
      - "16686:16686"

  n8n:
    image: n8nio/n8n:latest
    container_name: aether-n8n
    ports:
      - "5678:5678"
